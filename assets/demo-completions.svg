<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
      @keyframes cursorBlink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      @keyframes typeG {
        0%, 15% { opacity: 0; }
        16%, 100% { opacity: 1; }
      }
      @keyframes typeE {
        0%, 25% { opacity: 0; }
        26%, 100% { opacity: 1; }
      }
      @keyframes dropdownAppear {
        0%, 30% { opacity: 0; transform: translateY(-4px); }
        35%, 100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes highlightFirst {
        0%, 34% { opacity: 0; }
        35%, 100% { opacity: 1; }
      }
      @keyframes item1 { 0%, 35% { opacity: 0; } 38% { opacity: 1; } }
      @keyframes item2 { 0%, 38% { opacity: 0; } 41% { opacity: 1; } }
      @keyframes item3 { 0%, 41% { opacity: 0; } 44% { opacity: 1; } }
      @keyframes item4 { 0%, 44% { opacity: 0; } 47% { opacity: 1; } }
      @keyframes item5 { 0%, 47% { opacity: 0; } 50% { opacity: 1; } }
      @keyframes item6 { 0%, 50% { opacity: 0; } 53% { opacity: 1; } }
      @keyframes item7 { 0%, 53% { opacity: 0; } 56% { opacity: 1; } }
      @keyframes detailAppear {
        0%, 58% { opacity: 0; }
        62%, 100% { opacity: 1; }
      }
      .cursor { animation: cursorBlink 1s infinite; }
      .typeG { animation: typeG 7s forwards; opacity: 0; }
      .typeE { animation: typeE 7s forwards; opacity: 0; }
      .dropdown { animation: dropdownAppear 7s forwards; opacity: 0; }
      .item1 { animation: item1 7s forwards; opacity: 0; }
      .item2 { animation: item2 7s forwards; opacity: 0; }
      .item3 { animation: item3 7s forwards; opacity: 0; }
      .item4 { animation: item4 7s forwards; opacity: 0; }
      .item5 { animation: item5 7s forwards; opacity: 0; }
      .item6 { animation: item6 7s forwards; opacity: 0; }
      .item7 { animation: item7 7s forwards; opacity: 0; }
      .detail { animation: detailAppear 7s forwards; opacity: 0; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#1e1e1e" rx="8" ry="8"/>

  <!-- Title bar -->
  <rect width="800" height="32" fill="#2d2d2d" rx="8" ry="8"/>
  <rect y="20" width="800" height="12" fill="#2d2d2d"/>
  <circle cx="16" cy="16" r="5" fill="#ff5f57"/>
  <circle cx="34" cy="16" r="5" fill="#ffbd2e"/>
  <circle cx="52" cy="16" r="5" fill="#28c840"/>
  <rect x="72" y="4" width="140" height="24" rx="4" fill="#1e1e1e"/>
  <text x="92" y="20" font-family="monospace" font-size="11" fill="#d4d4d4">new-request.hurl</text>

  <!-- Line numbers gutter -->
  <rect x="0" y="32" width="40" height="368" fill="#1a1a1a"/>

  <g font-family="'Cascadia Code', 'Fira Code', 'Consolas', monospace" font-size="14">

    <!-- Existing code (context) -->
    <text x="20" y="60" font-size="12" fill="#858585" text-anchor="middle">1</text>
    <text x="50" y="60" fill="#569cd6" font-weight="bold">POST</text>
    <text x="88" y="60" fill="#4ec9b0">https://api.example.com/data</text>

    <text x="20" y="84" font-size="12" fill="#858585" text-anchor="middle">2</text>
    <text x="50" y="84" fill="#9cdcfe">Content-Type</text>
    <text x="158" y="84" fill="#d4d4d4">:</text>
    <text x="168" y="84" fill="#ce9178">application/json</text>

    <text x="20" y="108" font-size="12" fill="#858585" text-anchor="middle">3</text>
    <text x="50" y="108" fill="#569cd6">HTTP</text>
    <text x="84" y="108" fill="#b5cea8">201</text>

    <text x="20" y="132" font-size="12" fill="#858585" text-anchor="middle">4</text>

    <!-- Line 5: typing line -->
    <text x="20" y="156" font-size="12" fill="#858585" text-anchor="middle">5</text>

    <!-- Typed characters -->
    <text x="50" y="156" fill="#569cd6" font-weight="bold" class="typeG">GE</text>

    <!-- Cursor -->
    <rect x="72" y="143" width="2" height="16" fill="#d4d4d4" class="cursor"/>
  </g>

  <!-- Completion dropdown -->
  <g class="dropdown" font-family="'Cascadia Code', 'Fira Code', 'Consolas', monospace">
    <!-- Dropdown background -->
    <rect x="46" y="164" width="320" height="202" rx="4" ry="4" fill="#252526" stroke="#454545" stroke-width="1"/>

    <!-- Highlight for first item -->
    <rect x="48" y="166" width="316" height="26" rx="2" fill="#094771" class="item1"/>

    <!-- GET (highlighted) -->
    <g class="item1">
      <text x="62" y="184" font-size="13" fill="#569cd6">&#9648;</text>
      <text x="80" y="184" font-size="13" fill="#ffffff" font-weight="bold">GET</text>
      <text x="200" y="184" font-size="11" fill="#888">HTTP Method</text>
    </g>

    <!-- POST -->
    <g class="item2">
      <text x="62" y="210" font-size="13" fill="#569cd6">&#9648;</text>
      <text x="80" y="210" font-size="13" fill="#d4d4d4">POST</text>
      <text x="200" y="210" font-size="11" fill="#888">HTTP Method</text>
    </g>

    <!-- PUT -->
    <g class="item3">
      <text x="62" y="236" font-size="13" fill="#569cd6">&#9648;</text>
      <text x="80" y="236" font-size="13" fill="#d4d4d4">PUT</text>
      <text x="200" y="236" font-size="11" fill="#888">HTTP Method</text>
    </g>

    <!-- PATCH -->
    <g class="item4">
      <text x="62" y="262" font-size="13" fill="#569cd6">&#9648;</text>
      <text x="80" y="262" font-size="13" fill="#d4d4d4">PATCH</text>
      <text x="200" y="262" font-size="11" fill="#888">HTTP Method</text>
    </g>

    <!-- DELETE -->
    <g class="item5">
      <text x="62" y="288" font-size="13" fill="#569cd6">&#9648;</text>
      <text x="80" y="288" font-size="13" fill="#d4d4d4">DELETE</text>
      <text x="200" y="288" font-size="11" fill="#888">HTTP Method</text>
    </g>

    <!-- HEAD -->
    <g class="item6">
      <text x="62" y="314" font-size="13" fill="#569cd6">&#9648;</text>
      <text x="80" y="314" font-size="13" fill="#d4d4d4">HEAD</text>
      <text x="200" y="314" font-size="11" fill="#888">HTTP Method</text>
    </g>

    <!-- OPTIONS -->
    <g class="item7">
      <text x="62" y="340" font-size="13" fill="#569cd6">&#9648;</text>
      <text x="80" y="340" font-size="13" fill="#d4d4d4">OPTIONS</text>
      <text x="200" y="340" font-size="11" fill="#888">HTTP Method</text>
    </g>

    <!-- Scrollbar hint -->
    <rect x="358" y="168" width="4" height="50" rx="2" fill="#555"/>
  </g>

  <!-- Detail popup (right side) -->
  <g class="detail">
    <rect x="376" y="164" width="280" height="80" rx="4" ry="4" fill="#252526" stroke="#454545" stroke-width="1"/>
    <text x="390" y="186" font-family="monospace" font-size="13" fill="#569cd6" font-weight="bold">GET</text>
    <text x="390" y="208" font-family="'Segoe UI', sans-serif" font-size="12" fill="#aaa">Retrieve data from the server.</text>
    <text x="390" y="228" font-family="'Segoe UI', sans-serif" font-size="12" fill="#aaa">Safe, idempotent, cacheable.</text>
  </g>

  <!-- Status bar -->
  <rect x="0" y="376" width="800" height="24" fill="#1a7a3a"/>
  <text x="12" y="392" font-family="monospace" font-size="11" fill="#fff">Hurl Toolkit</text>
  <text x="720" y="392" font-family="monospace" font-size="11" fill="#fff">Ln 5, Col 3</text>
</svg>