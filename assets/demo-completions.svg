<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
      @keyframes fadeInDropdown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes cursorBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      @keyframes highlightRow { from { opacity: 0; } to { opacity: 1; } }
      @keyframes typeChars { 0%, 10% { opacity: 0; } 15%, 100% { opacity: 1; } }
      .mono { font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace; }
      .ui { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <!-- Window frame -->
  <rect width="800" height="400" rx="8" fill="#1e1e1e"/>
  <rect width="800" height="36" rx="8" fill="#323233"/>
  <rect y="28" width="800" height="8" fill="#323233"/>

  <!-- Window controls -->
  <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#27c93f"/>

  <!-- Title -->
  <text x="400" y="22" text-anchor="middle" class="ui" font-size="12" fill="#999">new-request.hurl - Hurl Toolkit</text>

  <!-- Tab bar -->
  <rect y="36" width="800" height="28" fill="#252526"/>
  <rect x="0" y="36" width="160" height="28" fill="#1e1e1e"/>
  <text x="14" y="54" class="ui" font-size="11" fill="#cccccc">new-request.hurl</text>
  <rect x="0" y="62" width="160" height="2" fill="#22c55e"/>

  <!-- Line numbers gutter -->
  <rect x="0" y="64" width="44" height="336" fill="#1e1e1e"/>

  <!-- Existing code (context) -->
  <text x="30" y="88" class="mono" font-size="13" fill="#5c6370" text-anchor="end">1</text>
  <text x="52" y="88" class="mono" font-size="13" fill="#569cd6" font-weight="bold">POST</text>
  <text x="92" y="88" class="mono" font-size="13" fill="#4ec9b0">https://api.example.com/data</text>

  <text x="30" y="110" class="mono" font-size="13" fill="#5c6370" text-anchor="end">2</text>
  <text x="52" y="110" class="mono" font-size="13" fill="#9cdcfe">Content-Type</text>
  <text x="156" y="110" class="mono" font-size="13" fill="#d4d4d4">:</text>
  <text x="168" y="110" class="mono" font-size="13" fill="#ce9178">application/json</text>

  <text x="30" y="132" class="mono" font-size="13" fill="#5c6370" text-anchor="end">3</text>
  <text x="52" y="132" class="mono" font-size="13" fill="#569cd6">HTTP</text>
  <text x="92" y="132" class="mono" font-size="13" fill="#b5cea8">201</text>

  <text x="30" y="154" class="mono" font-size="13" fill="#5c6370" text-anchor="end">4</text>

  <!-- Line 5: typing line -->
  <text x="30" y="176" class="mono" font-size="13" fill="#5c6370" text-anchor="end">5</text>

  <!-- Typed characters -->
  <text x="52" y="176" class="mono" font-size="13" fill="#569cd6" font-weight="bold" style="animation: typeChars 7s forwards; opacity: 0;">GE</text>

  <!-- Cursor -->
  <rect x="74" y="164" width="2" height="16" fill="#aeafad" style="animation: cursorBlink 1.2s step-end infinite;"/>

  <!-- Autocomplete dropdown -->
  <g style="animation: fadeInDropdown 0.5s ease-out 1.2s both;">
    <rect x="48" y="184" width="340" height="195" rx="4" fill="#252526" stroke="#454545" stroke-width="1"/>

    <!-- Selected item highlight -->
    <rect x="49" y="185" width="338" height="24" fill="#094771" style="animation: highlightRow 0.3s ease-out 1.5s both;"/>

    <!-- GET (highlighted) -->
    <rect x="56" y="191" width="3" height="12" rx="1" fill="#22c55e"/>
    <text x="66" y="202" class="mono" font-size="12" fill="#e0e0e0" font-weight="bold">GET</text>
    <text x="280" y="202" class="mono" font-size="11" fill="#888">HTTP Method</text>

    <!-- POST -->
    <rect x="56" y="215" width="3" height="12" rx="1" fill="#22c55e"/>
    <text x="66" y="226" class="mono" font-size="12" fill="#bbbbbb">POST</text>
    <text x="280" y="226" class="mono" font-size="11" fill="#888">HTTP Method</text>

    <!-- PUT -->
    <rect x="56" y="239" width="3" height="12" rx="1" fill="#22c55e"/>
    <text x="66" y="250" class="mono" font-size="12" fill="#bbbbbb">PUT</text>
    <text x="280" y="250" class="mono" font-size="11" fill="#888">HTTP Method</text>

    <!-- PATCH -->
    <rect x="56" y="263" width="3" height="12" rx="1" fill="#22c55e"/>
    <text x="66" y="274" class="mono" font-size="12" fill="#bbbbbb">PATCH</text>
    <text x="280" y="274" class="mono" font-size="11" fill="#888">HTTP Method</text>

    <!-- DELETE -->
    <rect x="56" y="287" width="3" height="12" rx="1" fill="#22c55e"/>
    <text x="66" y="298" class="mono" font-size="12" fill="#bbbbbb">DELETE</text>
    <text x="280" y="298" class="mono" font-size="11" fill="#888">HTTP Method</text>

    <!-- HEAD -->
    <rect x="56" y="311" width="3" height="12" rx="1" fill="#22c55e"/>
    <text x="66" y="322" class="mono" font-size="12" fill="#bbbbbb">HEAD</text>
    <text x="280" y="322" class="mono" font-size="11" fill="#888">HTTP Method</text>

    <!-- OPTIONS -->
    <rect x="56" y="335" width="3" height="12" rx="1" fill="#22c55e"/>
    <text x="66" y="346" class="mono" font-size="12" fill="#bbbbbb">OPTIONS</text>
    <text x="280" y="346" class="mono" font-size="11" fill="#888">HTTP Method</text>

    <!-- Scrollbar hint -->
    <rect x="382" y="187" width="4" height="50" rx="2" fill="#555"/>
  </g>

  <!-- Detail panel -->
  <g style="animation: fadeInDropdown 0.5s ease-out 1.6s both;">
    <rect x="394" y="184" width="260" height="72" rx="4" fill="#252526" stroke="#454545" stroke-width="1"/>
    <text x="408" y="206" class="ui" font-size="12" fill="#cccccc" font-weight="600">GET</text>
    <text x="408" y="224" class="ui" font-size="11" fill="#999">Retrieve data from the server.</text>
    <text x="408" y="242" class="ui" font-size="11" fill="#999">Safe, idempotent, cacheable.</text>
  </g>

  <!-- Status bar -->
  <rect x="0" y="380" width="800" height="20" fill="#22c55e"/>
  <text x="12" y="394" class="ui" font-size="11" fill="#fff">Hurl Toolkit</text>
  <text x="720" y="394" class="ui" font-size="11" fill="#fff">Ln 5, Col 3</text>
</svg>