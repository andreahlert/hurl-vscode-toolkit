<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
      @keyframes cursorBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      @keyframes tooltipAppear { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes underlineAppear { from { opacity: 0; } to { opacity: 1; } }
      .mono { font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace; }
      .ui { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <!-- Window frame -->
  <rect width="800" height="400" rx="8" fill="#1e1e1e"/>
  <rect width="800" height="36" rx="8" fill="#323233"/>
  <rect y="28" width="800" height="8" fill="#323233"/>

  <!-- Window controls -->
  <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#27c93f"/>

  <!-- Title -->
  <text x="400" y="22" text-anchor="middle" class="ui" font-size="12" fill="#999">health.hurl - Hurl Toolkit</text>

  <!-- Tab bar -->
  <rect y="36" width="800" height="28" fill="#252526"/>
  <rect x="0" y="36" width="130" height="28" fill="#1e1e1e"/>
  <text x="14" y="54" class="ui" font-size="11" fill="#cccccc">health.hurl</text>
  <rect x="0" y="62" width="130" height="2" fill="#22c55e"/>

  <!-- Line numbers gutter -->
  <rect x="0" y="64" width="44" height="336" fill="#1e1e1e"/>

  <!-- Line 1: GET -->
  <text x="30" y="88" class="mono" font-size="13" fill="#5c6370" text-anchor="end">1</text>
  <text x="52" y="88" class="mono" font-size="13" fill="#569cd6" font-weight="bold">GET</text>
  <text x="86" y="88" class="mono" font-size="13" fill="#4ec9b0">https://api.example.com/health</text>

  <!-- Line 2: Header -->
  <text x="30" y="110" class="mono" font-size="13" fill="#5c6370" text-anchor="end">2</text>
  <text x="52" y="110" class="mono" font-size="13" fill="#9cdcfe">Accept</text>
  <text x="104" y="110" class="mono" font-size="13" fill="#d4d4d4">:</text>
  <text x="116" y="110" class="mono" font-size="13" fill="#ce9178">application/json</text>

  <!-- Line 3: blank -->
  <text x="30" y="132" class="mono" font-size="13" fill="#5c6370" text-anchor="end">3</text>

  <!-- Line 4: HTTP 200 (hover target) -->
  <text x="30" y="154" class="mono" font-size="13" fill="#5c6370" text-anchor="end">4</text>
  <text x="52" y="154" class="mono" font-size="13" fill="#569cd6">HTTP</text>
  <text x="92" y="154" class="mono" font-size="13" fill="#b5cea8">200</text>
  <line x1="92" y1="157" x2="118" y2="157" stroke="#b5cea8" stroke-width="1" style="animation: underlineAppear 0.3s ease-out 0.8s both;"/>

  <!-- Line 5: blank -->
  <text x="30" y="176" class="mono" font-size="13" fill="#5c6370" text-anchor="end">5</text>

  <!-- Line 6: [Asserts] -->
  <text x="30" y="198" class="mono" font-size="13" fill="#5c6370" text-anchor="end">6</text>
  <text x="52" y="198" class="mono" font-size="13" fill="#dcdcaa">[Asserts]</text>

  <!-- Line 7: assert -->
  <text x="30" y="220" class="mono" font-size="13" fill="#5c6370" text-anchor="end">7</text>
  <text x="52" y="220" class="mono" font-size="13" fill="#c586c0">status</text>
  <text x="104" y="220" class="mono" font-size="13" fill="#d4d4d4">==</text>
  <text x="128" y="220" class="mono" font-size="13" fill="#b5cea8">200</text>

  <!-- Line 8: assert -->
  <text x="30" y="242" class="mono" font-size="13" fill="#5c6370" text-anchor="end">8</text>
  <text x="52" y="242" class="mono" font-size="13" fill="#c586c0">jsonpath</text>
  <text x="120" y="242" class="mono" font-size="13" fill="#ce9178">"$.status"</text>
  <text x="212" y="242" class="mono" font-size="13" fill="#d4d4d4">==</text>
  <text x="236" y="242" class="mono" font-size="13" fill="#ce9178">"healthy"</text>

  <!-- Line 9: assert -->
  <text x="30" y="264" class="mono" font-size="13" fill="#5c6370" text-anchor="end">9</text>
  <text x="52" y="264" class="mono" font-size="13" fill="#c586c0">jsonpath</text>
  <text x="120" y="264" class="mono" font-size="13" fill="#ce9178">"$.uptime"</text>
  <text x="212" y="264" class="mono" font-size="13" fill="#d4d4d4">&gt;=</text>
  <text x="236" y="264" class="mono" font-size="13" fill="#b5cea8">0</text>

  <!-- Line 10 -->
  <text x="30" y="286" class="mono" font-size="13" fill="#5c6370" text-anchor="end">10</text>
  <text x="52" y="286" class="mono" font-size="13" fill="#c586c0">jsonpath</text>
  <text x="120" y="286" class="mono" font-size="13" fill="#ce9178">"$.version"</text>
  <text x="220" y="286" class="mono" font-size="13" fill="#c586c0">matches</text>
  <text x="284" y="286" class="mono" font-size="13" fill="#ce9178">"\\d+\\.\\d+\\.\\d+"</text>

  <!-- Hover tooltip -->
  <g style="animation: tooltipAppear 0.4s ease-out 0.8s both;">
    <rect x="72" y="86" width="400" height="60" rx="4" fill="#252526" stroke="#454545" stroke-width="1"/>
    <text x="86" y="108" class="ui" font-size="13" fill="#ffffff" font-weight="bold">200 OK</text>
    <line x1="86" y1="114" x2="458" y2="114" stroke="#454545" stroke-width="0.5"/>
    <text x="86" y="132" class="ui" font-size="11" fill="#aaaaaa">The request succeeded. The meaning of the success depends on the HTTP method.</text>
  </g>

  <!-- Mouse cursor (pointing at HTTP 200) -->
  <g style="animation: tooltipAppear 0.4s ease-out 0.8s both;">
    <g transform="translate(100, 155)">
      <path d="M0,0 L0,16 L4,12 L8,20 L11,18 L7,10 L12,10 Z" fill="white" stroke="#333" stroke-width="0.5"/>
    </g>
  </g>

  <!-- Status bar -->
  <rect x="0" y="380" width="800" height="20" fill="#22c55e"/>
  <text x="12" y="394" class="ui" font-size="11" fill="#fff">Hurl Toolkit</text>
  <text x="720" y="394" class="ui" font-size="11" fill="#fff">Ln 4, Col 8</text>
</svg>